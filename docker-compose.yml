version: '3.8'

services:
  # 1. CONTAINER KHỞI TẠO (INIT): Tự động tải file config và frontend rồi tự tắt
  setup-files:
    image: alpine:latest
    volumes:
      - pnm-configs:/shared_configs
      - pnm-frontend:/shared_frontend
    command: >
      /bin/sh -c "
      echo 'Đang cài đặt công cụ...' &&
      apk add --no-cache wget unzip &&

      echo 'Đang tải file cấu hình từ Github...' &&
      wget -qO /shared_configs/config.yaml https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-plugnmeet/main/config.yaml &&
      wget -qO /shared_configs/nats-server.conf https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-plugnmeet/main/nats-server.conf &&

      echo 'Đang tải Frontend PlugNmeet...' &&
      wget -qO /tmp/client.zip https://github.com/mynaparrot/plugNmeet-client/releases/download/v2.1.7/plugnmeet-client.zip &&
      unzip -o /tmp/client.zip -d /shared_frontend &&
      
      echo 'Tạo thư mục CSS ảo để Backend không báo lỗi...' &&
      mkdir -p /shared_frontend/assets/css &&
      
      echo 'Hoàn tất khởi tạo!'
      "

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  nats:
    image: nats:2.12-alpine
    depends_on:
      setup-files:
        condition: service_completed_successfully
    command: ["-DVV", "-config", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
    volumes:
      - pnm-configs:/etc/nats
      - nats-data:/data/jetstream
    restart: unless-stopped

  etherpad:
    image: mynaparrot/plugnmeet-etherpad
    restart: unless-stopped

  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      setup-files:
        condition: service_completed_successfully
      mariadb:
        condition: service_started
    volumes:
      # Lấy config và frontend từ container khởi tạo
      - pnm-configs:/app/configs
      - pnm-frontend:/app/client/dist
      - plugnmeet-upload:/app/upload
    command: ["plugnmeet-server", "-config", "/app/configs/config.yaml"]
    environment:
      - LD_LIBRARY_PATH=/app/lib
    expose:
      - "8080"
    restart: unless-stopped

  plugnmeet-client:
    image: nginx:alpine
    depends_on:
      setup-files:
        condition: service_completed_successfully
    volumes:
      # Lấy frontend từ container khởi tạo
      - pnm-frontend:/usr/share/nginx/html
    command: >
      /bin/sh -c "
      echo 'Cập nhật URL API cho Frontend...' &&
      echo 'window.PLUGNMEET_SERVER_URL = \"https://api-meet.thanhnguyen.group\";' > /usr/share/nginx/html/config.js &&
      echo 'window.PLUGNMEET_SERVER_URL = \"https://api-meet.thanhnguyen.group\";' > /usr/share/nginx/html/assets/config.js &&
      
      echo 'Tải Logo tùy chỉnh...' &&
      wget -qO /usr/share/nginx/html/assets/imgs/main-logo-dark.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /usr/share/nginx/html/assets/imgs/main-logo-light.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /usr/share/nginx/html/favicon.ico 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&

      echo 'Cấu hình Nginx...' &&
      echo 'server { 
        listen 80; 
        root /usr/share/nginx/html; 
        index index.html; 
        location / { 
          try_files \$$uri /index.html; 
        } 
        location /nats {
          proxy_pass http://nats:8222;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"Upgrade\";
          proxy_set_header Host \$$host;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      
      echo 'Khởi động Nginx...' &&
      nginx -g 'daemon off;'
      "
    expose:
      - "80"
    restart: unless-stopped

volumes:
  mariadb-data:
  nats-data:
  plugnmeet-upload:
  pnm-configs:
  pnm-frontend:
