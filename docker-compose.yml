nats:
    image: nats:2.12-alpine
    command:
      - "-DVV"
      - "-config"
      - "/pnm-nats.conf" # Gọi tên file mới
    ports:
      - "4222:4222"
    volumes:
      - ./pnm-nats.conf:/pnm-nats.conf # Mount file mới
      - nats-data:/data/jetstream
    restart: unless-stopped

  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      - mariadb
      - nats
    volumes:
      - ./pnm-config.yaml:/app/pnm-config.yaml # Mount file mới
      - plugnmeet-upload:/app/upload
    command: ["plugnmeet-server", "-config", "/app/pnm-config.yaml"] # Trỏ config vào file mới
    environment:
      - LD_LIBRARY_PATH=/app/lib
    expose:
      - "8080"
    restart: unless-stopped
