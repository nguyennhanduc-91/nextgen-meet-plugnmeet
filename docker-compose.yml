version: '3.8'

services:
  # 1. DATABASE LƯU TRỮ
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  # 2. LÕI XỬ LÝ LOGIC (PLUGNMEET SERVER)
  plugnmeet-server:
    # ĐÃ FIX: Server dùng bản v2.1.6
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      - mariadb
    volumes:
      - ./config.yaml:/app/config.yaml
    ports:
      - "8080:8080"
    restart: unless-stopped

  # 3. GIAO DIỆN NGƯỜI DÙNG (PLUGNMEET CLIENT)
  plugnmeet-client:
    # ĐÃ FIX: Client dùng bản v2.1.7 mới nhất
    image: mynaparrot/plugnmeet-client:v2.1.7
    environment:
      - PLUGNMEET_SERVER_URL=https://api-meet.thanhnguyen.group
    volumes:
      - ./config.json:/usr/share/nginx/html/assets/config.json
    # ĐÃ TỐI ƯU: Tự động chèn Logo của Thanh Nguyen Group
    command: >
      /bin/sh -c "wget -qO /usr/share/nginx/html/assets/logo.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /usr/share/nginx/html/assets/favicon.ico 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      nginx -g 'daemon off;'"
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mariadb-data:
