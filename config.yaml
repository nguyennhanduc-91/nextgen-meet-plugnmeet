client:
  port: 8080
  debug: true
  path: "./client/dist"
  api_key: "thanhnguyen_api"
  secret: "thanhnguyen_secret_key_2026"
  
  # Đã cập nhật domain theo ý bạn
  cors_allowed_origins:
    - "https://room.thanhnguyen.group"
    - "http://localhost:3000"

  copyright_conf:
    display: true
    text: 'Powered by <a href="https://thanhnguyen.group" target="_blank">Thanh Nguyen Group</a>'

# KẾT NỐI VỚI LIVEKIT HIỆN TẠI CỦA BẠN
livekit_info:
  host: "https://livekit.thanhnguyen.group"
  api_key: "API_nextgen_admin_key"
  secret: "SEC_thanhnguyen_group_super_secure_9999"

# KẾT NỐI REDIS (Dùng port 6380 như trong livekit.yaml của bạn)
redis_info:
  host: "host.docker.internal:6380"
  db: 0

# KẾT NỐI DATABASE (Sẽ chạy cùng cụm Docker)
database_info:
  driver_name: mysql
  host: "plugnmeet-db"
  port: 3306
  username: "root"
  password: "thanhnguyen_db_password"
  db: "plugnmeet"

# CẤU HÌNH NATS (Quan trọng để chat và bảng trắng hoạt động)
